<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
<title>زرافة تمشي في غابة كثيفة مع أشعة شمس متسللة عبر الأشجار</title>
<desc>رسم متحرك بأسلوب واقعي مبسط لزرافة ذات رقبة طويلة وبقع بنية تمشي بهدوء من اليمين إلى اليسار عبر غابة خضراء، مع أشجار تتمايل برفق وأشعة شمس متسللة.</desc>

<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0f1c0a"/>
    <stop offset="45%" stop-color="#1c3016"/>
    <stop offset="78%" stop-color="#33481d"/>
    <stop offset="100%" stop-color="#4a5a22"/>
  </linearGradient>

  <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3c4a1c"/>
    <stop offset="55%" stop-color="#2e3814"/>
    <stop offset="100%" stop-color="#1c220c"/>
  </linearGradient>

  <linearGradient id="ray" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffe9a8" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#ffe9a8" stop-opacity="0"/>
  </linearGradient>

  <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#241708"/>
    <stop offset="50%" stop-color="#4b3220"/>
    <stop offset="100%" stop-color="#20140a"/>
  </linearGradient>

  <radialGradient id="leaf1" cx="35%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#5c8a3a"/>
    <stop offset="100%" stop-color="#233d16"/>
  </radialGradient>
  <radialGradient id="leaf2" cx="40%" cy="25%" r="75%">
    <stop offset="0%" stop-color="#4a7830"/>
    <stop offset="100%" stop-color="#1c3212"/>
  </radialGradient>

  <linearGradient id="furBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e3b158"/>
    <stop offset="100%" stop-color="#c68a3c"/>
  </linearGradient>
  <linearGradient id="furLegLower" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#a97a3c"/>
    <stop offset="100%" stop-color="#4a3018"/>
  </linearGradient>

  <radialGradient id="vignette" cx="50%" cy="45%" r="72%">
    <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>

  <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3.2"/>
  </filter>

  <clipPath id="bodyClip">
    <ellipse cx="205" cy="405" rx="128" ry="66"/>
  </clipPath>
  <clipPath id="neckClip">
    <path d="M255,368 C265,300 285,220 320,150 C338,115 358,90 388,72 L415,90 C392,115 372,148 352,195 C325,255 305,320 300,375 Z"/>
  </clipPath>
</defs>

<rect x="0" y="0" width="1920" height="1080" fill="url(#sky)"/>

<g opacity="0.9">
  <polygon points="260,-40 640,-40 430,760 210,760" fill="url(#ray)">
    <animate attributeName="opacity" values="0.35;0.6;0.35" dur="7s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="520,-40 760,-40 560,780 400,780" fill="url(#ray)">
    <animate attributeName="opacity" values="0.5;0.25;0.5" dur="9s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="1180,-40 1480,-40 1260,780 1040,780" fill="url(#ray)">
    <animate attributeName="opacity" values="0.3;0.55;0.3" dur="8s" repeatCount="indefinite"/>
  </polygon>
</g>

<g filter="url(#soften)" opacity="0.75">
  <g transform="translate(90,120)">
    <rect x="-8" y="180" width="16" height="260" fill="#1a2a10"/>
    <ellipse cx="0" cy="140" rx="150" ry="150" fill="url(#leaf1)"/>
  </g>
  <g transform="translate(520,80)">
    <rect x="-9" y="200" width="18" height="300" fill="#1a2a10"/>
    <ellipse cx="0" cy="150" rx="170" ry="165" fill="url(#leaf2)"/>
  </g>
  <g transform="translate(1050,100)">
    <rect x="-8" y="190" width="16" height="280" fill="#1a2a10"/>
    <ellipse cx="0" cy="145" rx="160" ry="155" fill="url(#leaf1)"/>
  </g>
  <g transform="translate(1620,70)">
    <rect x="-9" y="205" width="18" height="300" fill="#1a2a10"/>
    <ellipse cx="0" cy="150" rx="175" ry="170" fill="url(#leaf2)"/>
  </g>
  <g transform="translate(1830,150)">
    <rect x="-7" y="170" width="14" height="240" fill="#1a2a10"/>
    <ellipse cx="0" cy="135" rx="140" ry="135" fill="url(#leaf1)"/>
  </g>
</g>

<g class="sway sway-a">
  <rect x="122" y="430" width="26" height="520" fill="url(#trunk)"/>
  <g class="leaf-cluster" style="transform-origin:135px 430px">
    <ellipse cx="60" cy="330" rx="120" ry="115" fill="url(#leaf1)"/>
    <ellipse cx="-70" cy="360" rx="105" ry="100" fill="url(#leaf2)"/>
    <ellipse cx="10" cy="260" rx="140" ry="120" fill="url(#leaf1)"/>
  </g>
</g>

<g class="sway sway-b">
  <rect x="1680" y="410" width="30" height="540" fill="url(#trunk)"/>
  <g class="leaf-cluster" style="transform-origin:1695px 410px">
    <ellipse cx="-70" cy="310" rx="130" ry="125" fill="url(#leaf2)"/>
    <ellipse cx="70" cy="345" rx="110" ry="105" fill="url(#leaf1)"/>
    <ellipse cx="0" cy="240" rx="150" ry="125" fill="url(#leaf2)"/>
  </g>
</g>

<g class="sway sway-a" style="animation-delay:-2.4s">
  <rect x="1440" y="530" width="24" height="430" fill="url(#trunk)"/>
  <g class="leaf-cluster" style="transform-origin:1452px 530px">
    <ellipse cx="40" cy="260" rx="105" ry="100" fill="url(#leaf1)"/>
    <ellipse cx="-60" cy="290" rx="95" ry="90" fill="url(#leaf2)"/>
  </g>
</g>

<g class="sway sway-b" style="animation-delay:-1.1s">
  <rect x="60" y="560" width="22" height="400" fill="url(#trunk)"/>
  <g class="leaf-cluster" style="transform-origin:71px 560px">
    <ellipse cx="-30" cy="250" rx="100" ry="95" fill="url(#leaf2)"/>
    <ellipse cx="60" cy="275" rx="90" ry="88" fill="url(#leaf1)"/>
  </g>
</g>

<g class="dust">
  <circle cx="300" cy="500" r="2.4" fill="#ffe9a8" opacity="0.5"/>
  <circle cx="700" cy="620" r="1.8" fill="#ffe9a8" opacity="0.4"/>
  <circle cx="1200" cy="470" r="2.2" fill="#ffe9a8" opacity="0.45"/>
  <circle cx="1550" cy="600" r="1.6" fill="#ffe9a8" opacity="0.35"/>
  <circle cx="950" cy="720" r="2" fill="#ffe9a8" opacity="0.4"/>
</g>

<rect x="0" y="950" width="1920" height="130" fill="url(#ground)"/>
<g fill="#22300f" opacity="0.8">
  <polygon points="150,955 160,925 170,955"/>
  <polygon points="420,955 432,918 444,955"/>
  <polygon points="760,955 770,930 782,955"/>
  <polygon points="1100,955 1112,922 1124,955"/>
  <polygon points="1450,955 1460,928 1472,955"/>
  <polygon points="1720,955 1732,920 1744,955"/>
</g>

<g class="giraffe-position">
<g class="giraffe-bob">

  <g class="leg leg-swing-b" style="transform-origin:118px 465px">
    <path d="M118,465 L126,600" stroke="url(#furBody)" stroke-width="30" stroke-linecap="round" fill="none"/>
    <path d="M126,600 L134,752" stroke="url(#furLegLower)" stroke-width="22" stroke-linecap="round" fill="none"/>
    <rect x="122" y="748" width="24" height="16" rx="5" fill="#2a1c10"/>
  </g>
  <g class="leg leg-swing-b" style="transform-origin:272px 452px">
    <path d="M272,452 L266,595" stroke="url(#furBody)" stroke-width="32" stroke-linecap="round" fill="none"/>
    <path d="M266,595 L260,748" stroke="url(#furLegLower)" stroke-width="23" stroke-linecap="round" fill="none"/>
    <rect x="248" y="744" width="24" height="16" rx="5" fill="#2a1c10"/>
  </g>

  <g class="tail" style="transform-origin:125px 395px">
    <path d="M125,395 C95,430 70,470 66,520 C64,540 68,552 78,558" stroke="#c68a3c" stroke-width="9" stroke-linecap="round" fill="none"/>
    <ellipse cx="80" cy="562" rx="10" ry="16" fill="#3a2612"/>
  </g>

  <g>
    <ellipse cx="205" cy="405" rx="128" ry="66" fill="url(#furBody)"/>
    <ellipse cx="285" cy="385" rx="62" ry="56" fill="url(#furBody)"/>
    <path d="M255,368 C265,300 285,220 320,150 C338,115 358,90 388,72 L415,90 C392,115 372,148 352,195 C325,255 305,320 300,375 Z" fill="url(#furBody)"/>

    <g clip-path="url(#bodyClip)" opacity="0.92">
      <ellipse cx="150" cy="380" rx="26" ry="20" fill="#7a4a20" transform="rotate(-10 150 380)"/>
      <ellipse cx="200" cy="360" rx="22" ry="18" fill="#7a4a20" transform="rotate(8 200 360)"/>
      <ellipse cx="250" cy="390" rx="24" ry="19" fill="#7a4a20" transform="rotate(-6 250 390)"/>
      <ellipse cx="170" cy="430" rx="20" ry="16" fill="#7a4a20" transform="rotate(12 170 430)"/>
      <ellipse cx="230" cy="440" rx="23" ry="17" fill="#7a4a20" transform="rotate(-14 230 440)"/>
      <ellipse cx="290" cy="420" rx="20" ry="16" fill="#7a4a20" transform="rotate(5 290 420)"/>
      <ellipse cx="120" cy="415" rx="18" ry="14" fill="#7a4a20" transform="rotate(4 120 415)"/>
      <ellipse cx="300" cy="360" rx="19" ry="15" fill="#7a4a20" transform="rotate(-8 300 360)"/>
    </g>

    <g clip-path="url(#neckClip)" opacity="0.92">
      <ellipse cx="290" cy="350" rx="22" ry="17" fill="#7a4a20" transform="rotate(20 290 350)"/>
      <ellipse cx="320" cy="290" rx="19" ry="15" fill="#7a4a20" transform="rotate(25 320 290)"/>
      <ellipse cx="345" cy="230" rx="17" ry="13" fill="#7a4a20" transform="rotate(28 345 230)"/>
      <ellipse cx="365" cy="175" rx="15" ry="12" fill="#7a4a20" transform="rotate(30 365 175)"/>
      <ellipse cx="380" cy="125" rx="13" ry="10" fill="#7a4a20" transform="rotate(32 380 125)"/>
      <ellipse cx="310" cy="240" rx="14" ry="11" fill="#7a4a20" transform="rotate(20 310 240)"/>
      <ellipse cx="335" cy="185" rx="13" ry="10" fill="#7a4a20" transform="rotate(22 335 185)"/>
    </g>

    <g transform="translate(392,68)">
      <path d="M-6,10 C-2,-30 8,-55 22,-72 C34,-58 40,-32 36,4 C30,26 8,34 -6,26 Z" fill="url(#furBody)"/>
      <ellipse cx="-20" cy="-8" rx="12" ry="18" fill="url(#furBody)" transform="rotate(-25 -20 -8)"/>
      <ellipse cx="30" cy="-16" rx="11" ry="16" fill="url(#furBody)" transform="rotate(20 30 -16)"/>
      <rect x="4" y="-78" width="7" height="16" rx="3" fill="#c68a3c"/>
      <rect x="20" y="-80" width="7" height="16" rx="3" fill="#c68a3c"/>
      <circle cx="7" cy="-80" r="5" fill="#4a3018"/>
      <circle cx="23" cy="-82" r="5" fill="#4a3018"/>
      <circle cx="18" cy="-10" r="5.5" fill="#20140a"/>
      <circle cx="19.5" cy="-11.5" r="1.6" fill="#eee"/>
      <ellipse cx="34" cy="18" rx="6" ry="4" fill="#2a1c10"/>
    </g>
  </g>

  <g class="leg leg-swing-a" style="transform-origin:150px 470px">
    <path d="M150,470 L156,605" stroke="url(#furBody)" stroke-width="31" stroke-linecap="round" fill="none"/>
    <path d="M156,605 L162,756" stroke="url(#furLegLower)" stroke-width="23" stroke-linecap="round" fill="none"/>
    <rect x="150" y="752" width="24" height="16" rx="5" fill="#2a1c10"/>
  </g>
  <g class="leg leg-swing-a" style="transform-origin:300px 458px">
    <path d="M300,458 L296,600" stroke="url(#furBody)" stroke-width="33" stroke-linecap="round" fill="none"/>
    <path d="M296,600 L292,754" stroke="url(#furLegLower)" stroke-width="24" stroke-linecap="round" fill="none"/>
    <rect x="278" y="750" width="26" height="16" rx="5" fill="#2a1c10"/>
  </g>

</g>
</g>

<rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>

<style>
  .sway { animation: treeSway 5s ease-in-out infinite; }
  .sway-a .leaf-cluster { animation: leafSwayA 4.5s ease-in-out infinite; }
  .sway-b .leaf-cluster { animation: leafSwayB 5.2s ease-in-out infinite; }
  @keyframes treeSway {
    0%,100% { transform: rotate(0deg); }
    50% { transform: rotate(0.6deg); }
  }
  @keyframes leafSwayA {
    0%,100% { transform: rotate(-2.2deg); }
    50% { transform: rotate(2.5deg); }
  }
  @keyframes leafSwayB {
    0%,100% { transform: rotate(2.4deg); }
    50% { transform: rotate(-2deg); }
  }

  .dust circle { animation: drift 6s ease-in-out infinite; }
  .dust circle:nth-child(2n) { animation-duration: 8s; }
  @keyframes drift {
    0% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-40px); opacity: 0.15; }
    100% { transform: translateY(-80px); opacity: 0; }
  }

  .giraffe-position {
    animation: walkAcross 9s linear infinite;
  }
  @keyframes walkAcross {
    0% { transform: translate(2100px,190px); }
    100% { transform: translate(-650px,190px); }
  }

  .giraffe-bob {
    animation: bob 0.95s ease-in-out infinite;
    transform-box: fill-box;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }

  .leg { transform-box: fill-box; }
  .leg-swing-a { animation: legSwing 1.9s ease-in-out infinite; }
  .leg-swing-b { animation: legSwing 1.9s ease-in-out infinite; animation-delay: 0.95s; }
  @keyframes legSwing {
    0%,100% { transform: rotate(16deg); }
    50% { transform: rotate(-16deg); }
  }

  .tail { transform-box: fill-box; animation: tailSwing 2.6s ease-in-out infinite alternate; }
  @keyframes tailSwing {
    0% { transform: rotate(-8deg); }
    100% { transform: rotate(8deg); }
  }
</style>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" preserveAspectRatio="xMidYMid meet" role="img" font-family="Tahoma, Arial, sans-serif">
<title>كيف ينتقل الماء والهواء إلى النباتات؟</title>
<desc>رسم توضيحي أصلي يعرض صعود الماء عبر الأوعية الخشبية في الساق، ومقطعًا مكبرًا للساق، وتبادل الهواء عبر ثغور الورقة</desc>

<defs>
<clipPath id="jarWaterClip"><rect x="150" y="650" width="120" height="140" rx="6"/></clipPath>
<clipPath id="tubeClip"><rect x="420" y="420" width="20" height="140" rx="8"/></clipPath>
<marker id="arrowUp" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
<path d="M1 1L5 9L9 1" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style><![CDATA[
@keyframes riseUp { 0%{transform:translateY(0);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateY(-430px);opacity:0} }
.waterDot{animation:riseUp 4s linear infinite}
@keyframes leafSway { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(1.5deg)} }
#plantGroup{transform-box:fill-box;transform-origin:210px 650px;animation:leafSway 4s ease-in-out infinite}
@keyframes vaporOut { 0%{transform:translateY(0);opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{transform:translateY(-50px);opacity:0} }
@keyframes co2In { 0%{transform:translateY(-40px);opacity:0} 15%{opacity:1} 80%{opacity:1} 100%{transform:translateY(0);opacity:0} }
.gasDot{animation-timing-function:linear;animation-iteration-count:infinite}
@keyframes stomaBreathe { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(1.4)} }
#stomaShape{transform-box:fill-box;transform-origin:center;animation:stomaBreathe 2s ease-in-out infinite}
@keyframes moleculeRise { 0%{transform:translateY(0)} 100%{transform:translateY(-30px)} }
.molecule{animation:moleculeRise 1.2s linear infinite}
text{font-family:Tahoma, Arial, sans-serif}
@media (prefers-reduced-motion: reduce){
  .waterDot,.gasDot,.molecule,#plantGroup,#stomaShape{animation:none}
}
]]></style>
</defs>

<!-- ===================== الخلفية ===================== -->
<g id="background">
<rect x="0" y="0" width="1100" height="700" fill="#F7F9F4"/>
<rect x="170" y="10" width="760" height="38" rx="19" fill="#2E8B57"/>
<text x="550" y="34" font-size="16" font-weight="bold" text-anchor="middle" fill="#FFFFFF">كيف ينتقل الماء والهواء إلى النباتات؟</text>
</g>

<!-- ===================== طبقة العناصر (النبتة + المقطع المكبر + لوحة الشرح) ===================== -->
<g id="objects">

<!-- === المكوّن أ : النبتة الكاملة (ساق + أوراق + جرة) === -->
<g transform="translate(-7.96,-22.96) scale(0.8662)">

	<!-- المجموعة المتأرجحة بلطف (الساق والأوراق فقط) -->
	<g id="plantGroup">
		<!-- الجذع والساق -->
		<g class="lbl">
			<path d="M204 650 C 202 500, 200 350, 198 220" fill="none" stroke="#4C8C3C" stroke-width="10" stroke-linecap="round"/>
			<!-- الأنابيب الدقيقة (حزمة الأوعية الخشبية) الظاهرة بطول الساق -->
			<path d="M200 648 C 198 500, 196 350, 194 222" fill="none" stroke="#8FC1D6" stroke-width="1.3" opacity="0.85"/>
			<path d="M204 648 C 202 500, 200 350, 198 222" fill="none" stroke="#8FC1D6" stroke-width="1.3" opacity="0.85"/>
			<path d="M208 648 C 206 500, 204 350, 202 222" fill="none" stroke="#8FC1D6" stroke-width="1.3" opacity="0.85"/>
		</g>

		<!-- مؤشر تجمع الأنابيب عند منتصف الساق -->
		<g class="lbl">
			<circle cx="201" cy="550" r="16" fill="#EAF3DE" stroke="#3D7A2E" stroke-width="1.5"/>
			<circle cx="196" cy="546" r="3" fill="#3D6FBF"/>
			<circle cx="203" cy="543" r="3" fill="#3D6FBF"/>
			<circle cx="207" cy="551" r="3" fill="#3D6FBF"/>
			<circle cx="199" cy="555" r="3" fill="#3D6FBF"/>
		</g>

		<!-- الأوراق الجانبية -->
		<g class="lbl">
			<path d="M198 320 C 150 300, 110 310, 90 340 C 130 345, 165 340, 198 335 Z" fill="#5FAE4A" stroke="#3D7A2E" stroke-width="1.2"/>
			<path d="M200 380 C 250 360, 290 368, 310 398 C 268 405, 232 400, 200 393 Z" fill="#5FAE4A" stroke="#3D7A2E" stroke-width="1.2"/>
		</g>

		<!-- الورقة العلوية الكبيرة -->
		<g class="lbl">
			<path d="M198 220 C 130 200, 90 150, 100 90 C 150 110, 190 150, 198 220 Z" fill="#63B24C" stroke="#3D7A2E" stroke-width="1.5"/>
			<path d="M198 220 C 130 205, 130 150, 130 150" fill="none" stroke="#3D7A2E" stroke-width="1" opacity="0.5"/>
		</g>

		<!-- الثغرة (مكبّرة، متحركة) -->
		<g id="stomaShape">
			<ellipse cx="130" cy="150" rx="7" ry="3.5" fill="#2A5A1E" stroke="#1E4014" stroke-width="0.8"/>
		</g>

		<!-- دائرة تكبير مقطع الساق (نقطة إشارة فقط) -->
		<circle cx="200" cy="470" r="22" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="3 3"/>
	</g>

	<!-- الجرة الشفافة بالماء الملون (لا تتأرجح) -->
	<g class="lbl">
		<path d="M150 650 L150 780 C 150 792, 160 800, 172 800 L 248 800 C 260 800, 270 792, 270 780 L 270 650 Z" fill="#FFFFFF" fill-opacity="0.35" stroke="#8CA8B5" stroke-width="2"/>
		<g clip-path="url(#jarWaterClip)">
			<rect x="150" y="660" width="120" height="140" fill="#3D6FBF" fill-opacity="0.55"/>
		</g>
		<ellipse cx="210" cy="650" rx="60" ry="8" fill="none" stroke="#8CA8B5" stroke-width="2"/>
	</g>
</g>
<!-- === نهاية المكوّن أ === -->

<!-- === المكوّن ب : المقطع العرضي المكبر للساق === -->
<g transform="translate(470,-50)">
	<g class="lbl">
		<circle cx="400" cy="240" r="85" fill="#EAF3DE" stroke="#3D7A2E" stroke-width="2"/>
		<!-- الأوعية الخشبية (تنقل الماء للأعلى) -->
		<g fill="#3D6FBF" stroke="#185FA5" stroke-width="1">
			<circle cx="370" cy="220" r="8"/>
			<circle cx="395" cy="210" r="8"/>
			<circle cx="420" cy="222" r="8"/>
			<circle cx="405" cy="245" r="8"/>
			<circle cx="378" cy="248" r="8"/>
		</g>
		<!-- اللحاء (ينقل الغذاء) -->
		<g fill="#F2B84C" stroke="#B5871E" stroke-width="1">
			<circle cx="355" cy="255" r="5"/>
			<circle cx="440" cy="250" r="5"/>
			<circle cx="400" cy="290" r="5"/>
			<circle cx="360" cy="290" r="5"/>
		</g>
		<text x="400" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#185FA5">أوعية خشبية (ماء)</text>
		<text x="400" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#8A5A12">أوعية لحائية (غذاء)</text>
	</g>
</g>
<!-- === نهاية المكوّن ب === -->

<!-- === المكوّن ج : لوحة "لماذا يصعد الماء؟" === -->
<g transform="translate(340.5,-140.5) scale(1.3)">
	<rect x="315" y="385" width="230" height="215" rx="10" fill="#FFFFFF" stroke="#D8D3C4" stroke-width="1.2"/>
	<text x="430" y="408" font-size="14" font-weight="bold" text-anchor="middle" fill="#185FA5">لماذا يصعد الماء للأعلى؟</text>

	<!-- أنبوب توضيحي مصغر مع جزيئات متماسكة -->
	<rect x="420" y="420" width="20" height="140" rx="8" fill="#EAF3DE" stroke="#8CA8B5" stroke-width="1.2"/>
	<line x1="430" y1="435" x2="430" y2="555" stroke="#185FA5" stroke-width="1.5" opacity="0.6"/>

	<!-- سهم قوة السحب من الأعلى -->
	<path d="M430 405 L430 388" stroke="#2A6E8A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowUp)"/>

	<text x="345" y="432" font-size="10.5" font-weight="bold" fill="#8A5A12">١. الخاصية</text>
	<text x="345" y="444" font-size="10.5" font-weight="bold" fill="#8A5A12">الشعرية</text>
	<text x="345" y="458" font-size="9" fill="#5F5E5A">الماء يتسلق</text>
	<text x="345" y="470" font-size="9" fill="#5F5E5A">جدار الأنبوب</text>
	<line x1="395" y1="450" x2="418" y2="440" stroke="#8A5A12" stroke-width="0.6" stroke-dasharray="1.5 1.5"/>

	<text x="345" y="505" font-size="10.5" font-weight="bold" fill="#185FA5">٢. قوة</text>
	<text x="345" y="517" font-size="10.5" font-weight="bold" fill="#185FA5">التماسك</text>
	<text x="345" y="531" font-size="9" fill="#5F5E5A">جزيئات الماء</text>
	<text x="345" y="543" font-size="9" fill="#5F5E5A">متشابكة كسلسلة</text>
	<line x1="395" y1="520" x2="418" y2="500" stroke="#185FA5" stroke-width="0.6" stroke-dasharray="1.5 1.5"/>

	<text x="345" y="575" font-size="10.5" font-weight="bold" fill="#2A6E8A">٣. قوة النتح الساحبة</text>
	<text x="345" y="589" font-size="9" fill="#5F5E5A">الأقوى: تسحب من الأعلى</text>
</g>
<!-- === نهاية المكوّن ج === -->

<!-- === الأسهم والتسميات الرابطة بين المكوّنات === -->
<g id="callouts">
	<!-- الثغر -->
	<line x1="104.65" y1="106.97" x2="300" y2="112" stroke="#4A4A45" stroke-width="0.6" stroke-dasharray="2 2"/>
	<text x="305" y="108" font-size="13" font-weight="bold" text-anchor="start" fill="#2A5A1E">الثغر</text>
	<text x="305" y="124" font-size="10.5" text-anchor="start" fill="#5F5E5A">يُخرج بخار الماء ويُدخل CO2</text>

	<!-- مقطع مكبر للساق (يشير إلى المكوّن ب) -->
	<line x1="184.34" y1="384.15" x2="470" y2="255" stroke="#185FA5" stroke-width="1" stroke-dasharray="3 3"/>
	<text x="475" y="245" font-size="12.5" font-weight="bold" fill="#185FA5">مقطع مكبر للساق ⟶</text>

	<!-- حزمة أنابيب دقيقة جدًا -->
	<line x1="180.01" y1="453.45" x2="300" y2="340" stroke="#185FA5" stroke-width="0.6" stroke-dasharray="2 2"/>
	<text x="305" y="336" font-size="12.5" font-weight="bold" text-anchor="start" fill="#185FA5">حزمة أنابيب دقيقة جدًا</text>
	<text x="305" y="352" font-size="10.5" text-anchor="start" fill="#5F5E5A">(أقل من عرض الشعرة!)</text>

	<!-- الساق -->
	<line x1="178.27" y1="401.48" x2="300" y2="440" stroke="#4A4A45" stroke-width="0.6" stroke-dasharray="2 2"/>
	<text x="305" y="436" font-size="13.5" font-weight="bold" text-anchor="start" fill="#3D7A2E">الساق</text>
	<text x="305" y="452" font-size="10.5" text-anchor="start" fill="#5F5E5A">يحمل أنابيب دقيقة تنقل الماء للأعلى</text>

	<!-- ماء ملوّن -->
	<line x1="191.27" y1="583.38" x2="300" y2="568" stroke="#4A4A45" stroke-width="0.6" stroke-dasharray="2 2"/>
	<text x="305" y="564" font-size="13.5" font-weight="bold" text-anchor="start" fill="#185FA5">ماء ملوّن</text>
	<text x="305" y="580" font-size="10.5" text-anchor="start" fill="#5F5E5A">لمشاهدة مسار الماء داخل الساق</text>
</g>

<!-- === نص متبدّل لتوضيح دورة النتح === -->
<g id="processLabel">
	<text x="550" y="662" text-anchor="middle" font-size="15" font-weight="bold" fill="#185FA5" opacity="1">
		<animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.24;0.25;1" values="1;1;0;0"/>
		١) امتصاص الماء من الجذر
	</text>
	<text x="550" y="662" text-anchor="middle" font-size="15" font-weight="bold" fill="#185FA5" opacity="0">
		<animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.25;0.26;0.49;0.5;1" values="0;0;1;1;0;0"/>
		٢) صعود الماء عبر الأوعية الخشبية
	</text>
	<text x="550" y="662" text-anchor="middle" font-size="15" font-weight="bold" fill="#185FA5" opacity="0">
		<animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.5;0.51;0.74;0.75;1" values="0;0;1;1;0;0"/>
		٣) خروج بخار الماء من الثغور (النتح)
	</text>
	<text x="550" y="662" text-anchor="middle" font-size="15" font-weight="bold" fill="#185FA5" opacity="0">
		<animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.75;0.76;1" values="0;0;1;1"/>
		٤) دخول ثاني أكسيد الكربون عبر الثغور
	</text>
</g>

<text x="550" y="686" text-anchor="middle" font-size="10" fill="#8A8880">رسم توضيحي أصلي لمشروع «المعلمة الذكية» — لا يعتمد على أي مصدر خارجي</text>

</g>
<!-- ===================== نهاية طبقة العناصر ===================== -->

<!-- ===================== طبقة التأثيرات المتحركة (جزيئات ثابتة التعريف، بدون JavaScript) ===================== -->
<g id="effects">

	<!-- جزيئات الماء الصاعدة داخل الساق ومسار البخار وCO2 (بتحويل المكوّن أ نفسه) -->
	<g transform="translate(-7.96,-22.96) scale(0.8662)">
		<!-- بخار الماء الخارج عند الثغرة -->
		<circle class="gasDot" cx="128" cy="148" r="2.5" fill="#8FC1D6" style="animation-name:vaporOut;animation-duration:2.2s;animation-delay:0s"/>
		<circle class="gasDot" cx="131" cy="148" r="2.5" fill="#8FC1D6" style="animation-name:vaporOut;animation-duration:2.2s;animation-delay:0.7s"/>
		<circle class="gasDot" cx="134" cy="148" r="2.5" fill="#8FC1D6" style="animation-name:vaporOut;animation-duration:2.2s;animation-delay:1.4s"/>

		<!-- ثاني أكسيد الكربون الداخل عند الثغرة -->
		<circle class="gasDot" cx="133" cy="148" r="2.5" fill="#7F77DD" style="animation-name:co2In;animation-duration:2.2s;animation-delay:0.3s"/>
		<circle class="gasDot" cx="136" cy="148" r="2.5" fill="#7F77DD" style="animation-name:co2In;animation-duration:2.2s;animation-delay:1.0s"/>
		<circle class="gasDot" cx="139" cy="148" r="2.5" fill="#7F77DD" style="animation-name:co2In;animation-duration:2.2s;animation-delay:1.7s"/>

		<!-- جزيئات الماء الصاعدة من الجرة عبر الساق -->
		<circle class="waterDot" cx="200" cy="700" r="4" fill="#5AC8FA" stroke="#FFFFFF" stroke-width="1" style="animation-delay:0s"/>
		<circle class="waterDot" cx="204" cy="700" r="4" fill="#5AC8FA" stroke="#FFFFFF" stroke-width="1" style="animation-delay:0.65s"/>
		<circle class="waterDot" cx="208" cy="700" r="4" fill="#5AC8FA" stroke="#FFFFFF" stroke-width="1" style="animation-delay:1.3s"/>
		<circle class="waterDot" cx="200" cy="700" r="4" fill="#5AC8FA" stroke="#FFFFFF" stroke-width="1" style="animation-delay:1.95s"/>
		<circle class="waterDot" cx="204" cy="700" r="4" fill="#5AC8FA" stroke="#FFFFFF" stroke-width="1" style="animation-delay:2.6s"/>
		<circle class="waterDot" cx="208" cy="700" r="4" fill="#5AC8FA" stroke="#FFFFFF" stroke-width="1" style="animation-delay:3.25s"/>
	</g>

	<!-- جزيئات التماسك داخل الأنبوب التوضيحي (بتحويل المكوّن ج نفسه) -->
	<g transform="translate(340.5,-140.5) scale(1.3)">
		<g clip-path="url(#tubeClip)">
			<circle class="molecule" cx="430" cy="430" r="4.5" fill="#3D6FBF" stroke="#185FA5" stroke-width="0.8" style="animation-delay:0s"/>
			<circle class="molecule" cx="430" cy="460" r="4.5" fill="#3D6FBF" stroke="#185FA5" stroke-width="0.8" style="animation-delay:0.24s"/>
			<circle class="molecule" cx="430" cy="490" r="4.5" fill="#3D6FBF" stroke="#185FA5" stroke-width="0.8" style="animation-delay:0.48s"/>
			<circle class="molecule" cx="430" cy="520" r="4.5" fill="#3D6FBF" stroke="#185FA5" stroke-width="0.8" style="animation-delay:0.72s"/>
			<circle class="molecule" cx="430" cy="550" r="4.5" fill="#3D6FBF" stroke="#185FA5" stroke-width="0.8" style="animation-delay:0.96s"/>
		</g>
	</g>

</g>
<!-- ===================== نهاية طبقة التأثيرات ===================== -->

</svg>
